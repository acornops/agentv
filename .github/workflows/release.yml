name: Release AgentV

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: acornops/agentv

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Require tag and package version equality
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - run: npm run validate:ci
      - name: Verify release archive
        run: npm run smoke:package
      - name: Expose the selected Node.js runtime at the systemd path
        run: sudo ln -sf "$(command -v node)" /usr/bin/node
      - name: Run live systemd release gate
        env:
          AGENTV_SYSTEMD_SMOKE_ALLOW: "true"
        run: npm run smoke:systemd

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Resolve immutable release coordinates
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}:${version}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push read-only container image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.version.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build checksummed systemd archive
        run: npm run package:systemd
      - name: Generate archive SBOM
        uses: anchore/sbom-action@v0
        with:
          path: release
          format: spdx-json
          output-file: release/agentv-${{ steps.version.outputs.version }}.spdx.json
      - name: Attest systemd archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/agentv-${{ steps.version.outputs.version }}.tar.gz
      - name: Publish immutable release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/agentv-${{ steps.version.outputs.version }}.tar.gz
            release/agentv-${{ steps.version.outputs.version }}.tar.gz.sha256
            release/agentv-${{ steps.version.outputs.version }}.spdx.json
